[Main]
flags=-m
server_path=server_path
llm_list = [model1, model2, model3]
default_llm = qwen
dict_cmds = {"help":"Список доступных команд", "info":"Какая модель запущена", "list":"Список доступных языковых моделей", "exit":"Завершить работу сервера", "название_модели" : "Запускается выбранная вами модель"}
[model1]
flags=-c 32768 --parallel 1 -t 16 -ngl all -ncmoe 0 -n 4096 --reasoning-budget 0 --host 0.0.0.0 --port 8081 --temp 0.6 --top-k 20 --top-p 0.8 --presence-penalty 1.5 --repeat-penalty 1.15 -fa 1
path=path/to/model1.gguf

[model2]
flags=-c 49152 --seed 3407 --prio 2 -jinja --parallel 2 -n 2048 --host 0.0.0.0 --port 8081 --temp 0.6 --top-p 0.9 -fa 1 -t 6
path=path/to/model2.gguf

[model3]
flags=-c 32768 --parallel 1 -ngl auto -n 1000 -ncmoe 20 --host 0.0.0.0 --port 8081 --temp 0.7 --top-p 0.95 --repeat-penalty 1.15 -fa 1 -t 16
path=path/to/model3.gguf